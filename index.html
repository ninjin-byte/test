<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>文章カテゴリーツール</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      textarea {
        width: 100%;
        height: 100px;
      }
      .buttons {
        margin-top: 10px;
      }
      button {
        padding: 10px;
        margin-right: 10px;
        cursor: pointer;
      }
      #result {
        margin-top: 20px;
        border: 1px solid #ccc;
        padding: 10px;
        min-height: 50px;
      }
      #result p {
        border-bottom: 1px solid #eee; /* 文章の下に薄い線を入れる */
        padding-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <h1>文章カテゴリツール</h1>
    <p>分類したい文章を入力して、カテゴリーボタンを押してください。</p>

    <textarea id="inputText" placeholder="ここに文章を入力..."></textarea>

    <div class="buttons">
      <button onclick="classify('仕事')">仕事</button>
      <button onclick="classify('趣味')">趣味</button>
      <button onclick="classify('学習')">学習</button>
    </div>

    <h3>結果：</h3>
    <div id="result">ここに結果が表示されます</div>

    <script>
      // 1. ページ読み込み時に、保存されているデータを取得する
      let savedHistory = localStorage.getItem("myLogData") || "";
      let historyHtml = savedHistory;

      // 2. 最初に画面を表示した時に履歴を反映させる
      window.onload = function () {
        document.getElementById("result").innerHTML =
          historyHtml || "ここに結果が表示されます";
      };

      function classify(category) {
        const text = document.getElementById("inputText").value;
        const resultDiv = document.getElementById("result");

        if (text.trim() === "") {
          alert("文章を入力してください！");
          return;
        }

        // 新しい履歴を作成
        const newEntry = `<p><strong>【${category}】</strong>：${text}</p>`;

        // 履歴を更新（最新が上）
        historyHtml = newEntry + historyHtml;

        // 3. ブラウザにデータを保存する
        localStorage.setItem("myLogData", historyHtml);

        // 画面に表示
        resultDiv.innerHTML = historyHtml;

        // 入力欄を空にする
        document.getElementById("inputText").value = "";
      }
    </script>
  </body>
</html>
