<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>文章カテゴリーツール</title>
    <style>
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        background-color: #f0f2f5; /* 薄いグレーの背景 */
        display: flex;
        justify-content: center;
        padding: 40px 20px;
        color: #333;
      }

      /* 全体を白いカードのように囲む */
      .container {
        max-width: 600px;
        width: 100%;
        background: white;
        padding: 30px;
        border-radius: 15px; /* 角を丸く */
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); /* ふんわりした影 */
      }

      h1 {
        text-align: center;
        color: #1a73e8; /* Googleっぽい青 */
        margin-bottom: 10px;
      }

      textarea {
        width: 100%;
        height: 120px;
        padding: 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        box-sizing: border-box; /* 幅がはみ出ないように */
        font-size: 16px;
        resize: none; /* 大きさ固定 */
        transition: border-color 0.3s;
      }

      textarea:focus {
        outline: none;
        border-color: #1a73e8; /* 入力中だけ青く */
      }

      .buttons {
        display: flex;
        gap: 10px;
        margin: 20px 0;
        flex-wrap: wrap;
      }

      button {
        flex: 1;
        min-width: 80px;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background-color: #1a73e8;
        color: white;
        font-weight: bold;
        transition:
          transform 0.1s,
          opacity 0.2s;
      }

      button:hover {
        opacity: 0.8;
      }

      button:active {
        transform: scale(0.95); /* 押した時に少し凹む演出 */
      }

      /* 削除ボタンだけ色を変える */
      button[onclick="clearLogs()"] {
        background-color: #ea4335;
      }

      #result {
        margin-top: 20px;
        background: #fafafa;
        border-radius: 10px;
        padding: 5px 15px;
      }

      #result p {
        border-bottom: 1px solid #eee;
        padding: 10px 0;
        line-height: 1.6;
      }

      #result p:last-child {
        border-bottom: none;
      }

      /* プロジェクトを囲む枠（カード）のスタイル */
      .project-card {
        background: #ffffff;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 30px;
        transition: box-shadow 0.3s;
      }

      .project-card:hover {
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1); /* マウスを乗せると少し浮く */
      }

      .section-title {
        font-size: 1.5rem;
        margin: 40px 0 20px;
        border-left: 5px solid #ff9800; /* にんじんカラーのオレンジ */
        padding-left: 15px;
      }

      .skill-tag {
        display: inline-block;
        background: #fff3e0;
        color: #e65100;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        margin-right: 8px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header style="text-align: center; margin-bottom: 50px">
        <h1 style="font-size: 2.5rem; color: #333">🥕 にんじん's Portfolio</h1>
        <p style="font-size: 1.1rem; color: #666">
          こんにちは、にんじんのページです。
        </p>

        <div style="margin-top: 20px">
          <h3 style="font-size: 1rem; color: #999; text-transform: uppercase">
            Skills
          </h3>
          <span class="skill-tag">HTML5</span>
          <span class="skill-tag">CSS3</span>
          <span class="skill-tag">JavaScript</span>
          <span class="skill-tag">GitHub</span>
        </div>
      </header>

      <h2 class="section-title">Works</h2>

      <div class="project-card">
        <h3 style="margin-top: 0; color: #1a73e8">
          🚀 Project 01: My Life Log
        </h3>
        <p style="color: #666; font-size: 0.9rem">
          日々の活動を記録する自分専用ツールです。
        </p>

        <textarea id="inputText" placeholder="今日の出来事を入力..."></textarea>
        <div class="buttons">
          <button onclick="classify('📚 本')">本</button>
          <button onclick="classify('🎬 映画')">映画</button>
          <button onclick="classify('🍴 食事')">食事</button>
          <button onclick="clearLogs()">履歴消去</button>
        </div>

        <h4 style="margin-top: 20px; font-size: 0.9rem; color: #333">
          Timeline:
        </h4>
        <div id="result" style="max-height: 300px; overflow-y: auto">
          ここに結果が表示されます
        </div>
      </div>

      <div class="project-card" style="border-style: dashed; opacity: 0.6">
        <h3 style="margin-top: 0; color: #999">
          ⌛ Project 02: Coming Soon...
        </h3>
        <p style="color: #999; font-size: 0.9rem">
          次はAPIを使ったツールを作成予定です。
        </p>
      </div>
    </div>

    <script>
      // 1. ページ読み込み時に、保存されているデータを取得する
      let savedHistory = localStorage.getItem("myLogData") || "";
      let historyHtml = savedHistory;

      // 2. 最初に画面を表示した時に履歴を反映させる
      window.onload = function () {
        document.getElementById("result").innerHTML =
          historyHtml || "ここに結果が表示されます";
      };

      function classify(category) {
        const text = document.getElementById("inputText").value;
        const resultDiv = document.getElementById("result");

        if (text.trim() === "") {
          alert("文章を入力してください！");
          return;
        }

        // 新しい履歴を作成
        const newEntry = `<p><strong>【${category}】</strong>：${text}</p>`;

        // 履歴を更新（最新が上）
        historyHtml = newEntry + historyHtml;

        // 3. ブラウザにデータを保存する
        localStorage.setItem("myLogData", historyHtml);

        // 画面に表示
        resultDiv.innerHTML = historyHtml;

        // 入力欄を空にする
        document.getElementById("inputText").value = "";
      }
      function clearLogs() {
        if (confirm("本当にすべての履歴を消去しますか？")) {
          localStorage.removeItem("myLogData"); // 保存データを消す
          historyHtml = ""; // メモリ内のデータを空にする
          document.getElementById("result").innerHTML =
            "ここに結果が表示されます"; // 表示を戻す
        }
      }
    </script>
  </body>
</html>
